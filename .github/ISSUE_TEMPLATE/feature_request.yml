name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: A clear description of the feature.
      placeholder: Describe the feature...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why?
      description: What problem does this solve? What's the use case?
    validations:
      required: false

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - Android Phone
        - Android Tablet
        - Android Auto
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Playback
        - Library / Browsing
        - UI / Design
        - Visualizer
        - Audio (EQ, ReplayGain, Crossfade)
        - Offline / Downloads
        - Radio
        - Settings
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought of.
    validations:
      required: false
